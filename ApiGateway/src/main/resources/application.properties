#========================
# SERVER CONFIG
#========================
server.port=8900
spring.application.name=api-gateway

#========================
# EUREKA CONFIG
#========================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

#========================
# GATEWAY ROUTES (DÙNG StripPrefix=1 CHO TẤT CẢ)
#========================

# 1. USER: /api/users -> /users
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# 2. ORDER: /api/orders -> /orders
spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# 3. PRODUCT: /api/products -> /products
spring.cloud.gateway.routes[2].id=product-service
spring.cloud.gateway.routes[2].uri=lb://PRODUCT-CATALOG-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/products/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# 4. RECOMMENDATION: /api/recommendations -> /recommendations
spring.cloud.gateway.routes[3].id=recommendation-service
spring.cloud.gateway.routes[3].uri=lb://PRODUCT-RECOMMENDATION-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/recommendations/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

#========================
# REDIS & CORS
#========================
spring.session.store-type=redis
spring.redis.host=redis-11003.c292.ap-southeast-1-1.ec2.redislabs.com
spring.redis.port=11003
spring.redis.password=ĐIỀN_PASSWORD_REDIS_VÀO_ĐÂY

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins[0]=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods[0]=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders[0]=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600