##### SERVER #####
server.port=8813
spring.application.name=order-service

##### EUREKA #####
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

##### MYSQL (WORKBENCH - ĐÃ SỬA MẬT KHẨU) #####
spring.datasource.url=jdbc:mysql://localhost:3306/order_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

##### JPA #####
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

##### REDIS (ĐÃ SỬA THÀNH REDIS CLOUD) #####
spring.data.redis.host=redis-11003.c292.ap-southeast-1-1.ec2.redislabs.com
spring.data.redis.port=11003
spring.data.redis.password=ĐIỀN_PASSWORD_REDIS_VÀO_ĐÂY

spring.session.store-type=redis
spring.session.redis.namespace=session